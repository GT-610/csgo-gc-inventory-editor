name: Release

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  release:

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: csgo-inventory-editor-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: csgo-inventory-editor-windows-x86_64

    steps:
    - uses: actions/checkout@v6
    - name: Cache cargo registry
      uses: actions/cache@v5
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
    - name: Cache cargo index
      uses: actions/cache@v5
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
    - name: Cache cargo build
      uses: actions/cache@v5
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
    - name: Build release
      run: cargo build --release --target ${{ matrix.target }}
    - name: Prepare artifact
      shell: bash
      run: |
        if [ "${{ runner.os }}" == "Windows" ]; then
          mkdir -p artifact
          cp target/${{ matrix.target }}/release/csgo-inventory-editor.exe artifact/
          cp -r target/${{ matrix.target }}/release/csgo_gc artifact/
          cd artifact
          7z a ../${{ matrix.artifact_name }}.zip *
          cd ..
        else
          mkdir -p artifact
          cp target/${{ matrix.target }}/release/csgo-inventory-editor artifact/
          cp -r target/${{ matrix.target }}/release/csgo_gc artifact/
          cd artifact
          tar czf ../${{ matrix.artifact_name }}.tar.gz *
          cd ..
        fi
    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.artifact_name }}.*
        retention-days: 30
